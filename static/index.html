<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwritten Character Recognition — CodeAlpha Task 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-bg"></div>
    <div class="container">
        <header class="app-header">
            <div class="badge">CodeAlpha ML Internship — Task 3</div>
            <h1>Handwritten Digit & Character Recognition</h1>
            <p>Interactive Neural Network Canvas Classifier for handwritten digit recognition.</p>
        </header>

        <main class="dashboard-grid">
            <div class="card canvas-card">
                <h2>Draw a Digit (0 - 9)</h2>
                <div class="canvas-wrapper">
                    <canvas id="paint-canvas" width="280" height="280"></canvas>
                </div>
                <div class="btn-group">
                    <button id="clear-btn" class="btn-secondary">Clear Canvas</button>
                    <button id="predict-btn" class="btn-primary">Recognize Digit</button>
                </div>
            </div>

            <div class="card result-card">
                <h2>Recognition Output</h2>
                <div class="prediction-hero">
                    <div class="digit-display" id="pred-digit">?</div>
                    <div class="confidence-tag" id="confidence-tag">Draw & click Recognize</div>
                </div>

                <h3>Class Probabilities</h3>
                <div class="prob-grid" id="prob-grid">
                    <!-- Dynamic probability bars populated by app.js -->
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
